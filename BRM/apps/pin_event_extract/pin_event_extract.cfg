########################################
# search_event_type, search_field, and search_parameter
#
# Specify the event type used for the search. The event type here
# should be the event subclass that contains the search fields. Only
# events that are of the specified type or a subclass of the specified
# type will be extracted.
#
# Specify the search fields and parameters. The criteria specified
# as search parameters are used in addition to the implicit criteria
# from the rest of this file. It is the users responsibility to make
# sure that these fields exist in all of the events to be extracted.
# It is also the users responsibility to make sure that the fields are
# contained in the storable class specified by the event type.
#
########################################
