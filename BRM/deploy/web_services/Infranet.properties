#webservices.output.date.timezone=UTC
#webservices.input.date.format=yyyy-MM-dd'T'HH:mm:ss
#webservices.input.date.prefixunixtstamp=false
#webservices.input.date.timezone=UTC

wsm.audit.log.enabled=false

