# Infranet.properties file for dm_kafka.
# Contains configuration parameters for the DM Kafka Server.

########################################################
# JS Configuration
########################################################
# java servers port #
infranet.server.portNr = 12010
# the log file that the java server will log msgs to
infranet.log.file=/home/pin/opt/portal/BRM/var/dm_kafka/dm_kafka.pinlog
# the name of the application that the java server will use in it's log msgs.
infranet.log.name=DMKafkaServer
# log level.
infranet.log.level=1
# Java Server mode
infranet.server.mode=JS_DM_EAI
# Prints out timing information for opcode calls.
# infranet.server.enabletimeinfo=yes 

########################################################
# DM EAI Configuration
########################################################
infranet.dm.eai.handler=com.portal.dm.eai.plugin.DMKafkaEaiHandler
infranet.dm.dbno=0.0.9.6 / 0
infranet.dm.name=DM-KAFKA-1
infranet.connection.pool.enable=true
infranet.connection.pool.size=64

########################################################
# DM Kafka Configuration
########################################################
infranet.dm.kafka.configFile=dm_kafka_config.xml
infranet.json.buffer.encoding=base64
infranet.xml.buffer.encoding=base64

########################################################
# SSL configuration
########################################################
# To  enable SSL, make sure to provide correct values for below config entries. e.g wallet location and filename etc.
infranet.pcp.ssl.enabled = false
# To set the ciphersuites to be used.You can specify multiple ciphers seperated by commas.
#infranet.pcp.ssl.handshake.ciphersuites = TLS_RSA_WITH_AES_128_CBC_SHA
# To enable SSL 2 way authentication
infranet.pcp.ssl.client_auth = false
# Oracle wallet location
infranet.pcp.ssl.wallet.location = /home/pin/opt/portal/BRM/wallet/server
infranet.pcp.ssl.wallet.filename = cwallet.sso
