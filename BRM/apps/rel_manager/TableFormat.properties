# FILE: TableDefinition.properties
#
# DESCRIPTION:
#
# Table definitions for reports generated using the TableFormatter class. This
# allows those reports to generate data in a slightly configurable way so that
# one can include/remove columns which are more interesting to them, or to
# localize the header descriptions, change the column widths etc.
#
# The reporting scripts all generate objects defining the attributes which are
# retrieved.
#
# Each table in the reports is defined by a specific value comprised of:
#
#  1. The application name (e.g. rel_manager)
#  2. The table in the report (e.g. batch_rel_list).
#
# E.g. the example above would use a table name of the form:
#
#   rel_manager.batch_rel_list
#
# Most reports only have one or two tables. The definition for each table is
# introduced in this file using the 'TABLE=<app>.<table>' tag.
#
# After each 'TABLE' tag, a list of 'COLUMN' tags is found which define the
# attributes to include when formatting that particular table. This consists
# of a list of 7 attributes, described below:
#
#  1. The report type. This can be 'TEXT' (if the column should only be shown
#     in the 'txt' format report, 'CSV' (if the column should only be shown in
#     the 'csv' format report, or 'BOTH' (if the column should be shown in all
#     reports. You may comment out a column if you don't want it at all.
#
#  2. The attribute name. This will be the name of the attribute in the class
#     which collects the report data. See the class definitions for information
#     on the attributes they make available - every class has a 'getAttr(name)'
#     method which returns the attributes.
#
#  3. The text format. This is a formatting string for the 'String.format()'
#     method which will be used to format the attribute value.
#
#  4. The column width. This defines the width of the column in the report and
#     will be used for padding and justification. It should be compatible with
#     the format. Typically the width is 2 characters wider than the format to
#     allow a bit of white-space around the value.
#
#     NOTE: This is ignored in the CSV output.
#
#  5. The CSV format. This is a 'String.format()' formatting string which will
#     be used to format the attribute value for the CSV report.
#
#  6. The column header string. This will be printed on the header of the column
#     in the report.
#
#  7. The justification. This can be 'LEFT' for left-justified data, or 'RIGHT' for
#     right-justified data (numbers, typically).
#
#  8. Whether the column should be aggregated or not. This can be applied to any
#     numerical column and the total row may assume one of the following values:
#
#        none - no total value will be used for this column
#        sum  - the sum of the values will be calculated
#        avg  - the average of the values will be calculated
#        min  - the minimum of the values will be calculated
#        max  - the maximum of the values will be calculated
#
# INFORMATION:
#
# REL Manager ...
#
# REVISION:
#
# $Revision: 1.5 $
# $Author: ri-user-1 $
# $Date: 2021/09/03 15:38:00 $
