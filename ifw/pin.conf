#======================================================================
# @(#)% %full_filespec: pin_conf~4.0:ascii:4
#
# Configuration file for the testnap utility that you use to manually 
# interact with the database and to test your custom applications. 
#======================================================================
#
#======================================================================
# Use this file to specify how testnap connects with Infranet.
#
# A copy of this configuration file is automatically installed and 
# configured with default values when you install Infranet. However, 
# you can edit this file to suit your specific configuration:
#  -- You can change the default value of an entry.
#  -- You can exclude an optional entry by adding the # symbol
#     at the beginning of the line.
#  -- You can include a commented entry by removing the # symbol.
#
# Before you make any changes to this file, save a backup copy.
#
# To edit this file, follow the instructions in the commented sections.
# For more information on the general syntax of configuration entries,
# see "Reference Guide to Infranet Configuration Files" in the Infranet
# online documentation.
#======================================================================
#
#
#======================================================================
# cm_ptr
# 
# Pointer to the CM/CMMP. 
#
# Use a separate entry for each CM/CMMP. If testnap can't
# find the first CM/CMMP, it looks for the next in the list.
#
# Each entry includes three values:
#  -- <protocol>: the protocol must be "ip" for this release
#  -- <hostname>: name or IP address of the computer running
#          the CM/CMMP
#  -- <port>: TCP port number of the CM/CMMP on this computer
#
# The port number should match a corresponding cm_ports entry with
# the same port number in the CM/CMMP configuration file. The 
# default, 11960, is a commonly specified port for the CM/CMMP.
#======================================================================
- nap	cm_ptr	ip	XXX	11960
#- nap cm_ptr	ip	<hostname2>	<port2>


#======================================================================
# userid
#
# Database number and service type for the Infranet database. 
#
# The  database number is a dummy entry to identify the Infranet database 
# and connect to the correct Data Manager. The real database number is
# returned to the application by the CM when the login process completes.
# For connections that don't require a login name and password, 
# the CM also passes the service type to the database.
#
# The service type is "/service/pcm_client"
# Do not change these values.
#======================================================================

- - userid 0.0.0.1 /service/pcm_client 0

#======================================================================
# These entries contain the login information for connecting
# to the CM:
# 
#  -- "login_type" specifies whether the login name and password 
#     are required. Type 1, the default, indicates that name and 
#     password are required. Type 0 indicates that only the user
#     ID is required.
#
#  -- "login_name" specifies the login name to use when  
#      testnap requests a connection to the CM. If 
#     "login_type" is 0, you don't need to specify a login name.
#
#  -- "login_pw" specifies the password to use when testnap
#     connects to the CM. If "login_type" is 0, you 
#     don't need to specify a password.
#======================================================================
- nap	login_type	1			# type 1 is with password
- nap	login_name	root.0.0.0.1
- nap	login_pw	password

#========================================================================
#
# internal option
# specify to disable the NAGLE algorithm for sockets.
# default 0 is to enable the NAGLE algorithm
#
#========================================================================
- - pcp_nagle_disable 0

#======================================================================
# SSL specific entries
#
# disableSSL
# - nap   disableSSL <value>
# Eg: - nap   disableSSL 1
# This entry makes CM not to use SSL while communicating with
# PCM clients.
# By default SSL is used
# Values : 0(default) or 1.
#
# wallet
# - napwallet <wallet location> [<wallet's passphrase>]
# Eg : - napwallet ./wallet
#      - napwallet ./wallet     welcome
# wallet entry specifies wallet's location and the passphrase to open
# wallet if any.
# If wallet is not specified wallet location will default to
#       $PIN_HOME/wallet/client for PCM clients
#       ./wallet in CM.
# If wallet's passphrase not specified means wallet is auto login.
#
# cipher
# - nap cipher <comma separated list of ciphers>
# Eg: - nap  cipher SSL_RSA_WITH_3DES_EDE_CBC_SHA,SSL_RSA_WITH_RC4_128_MD5
#     - nap  cipher SSL_RSA_WITH_RC4_128_MD5
# Specifies the list of ciphers to be used by SSL. If multiple ciphers are
# specified they should be separated by commas.
#
# ssl_auth
# - nap   ssl_auth  2-way
# If this parameter is set SSL will do 2-way authentication.
# By default 1-way Server authentication is done.
#======================================================================
#- nap   disableSSL 1
#- nap  wallet ./wallet     welcome
#- nap  cipher SSL_RSA_WITH_3DES_EDE_CBC_SHA,SSL_RSA_WITH_RC4_128_MD5
#- nap   ssl_auth  2-way

#=======================================================================
# ptr_virtual_time
#
# Enables the use of pin_virtual_time to advance Portal time, and
# specifies the shared file for use by all Portal mangers.
#
# The entry has 2 values
#
# #/Empty       to disable / enable pin_virtual_time in all pin.conf files
#               default = #     (disable)
#
# <filepath>    location and name of the pin_virtual_time file shared by all Portal managers.
#               default = ${PIN_HOME}/lib/pin_virtual_time_file
#
#=======================================================================
# - - pin_virtual_time ${PIN_HOME}/lib/pin_virtual_time_file

#========================================================================
# enable_ssl
#
# Specifies whether SSL will be enabled for NET_EM connections
#
#    0 - SSL is disabled.
#    1 - SSL is enabled.
#========================================================================
- cm-em enable_ssl 1

#========================================================================
# wallet
#
# This entry specifies the location of the Oracle wallet used by NET_EM for
# storing the SSL certificate.
#
# This is an optional entry.
#
#========================================================================
- cm-em wallet $PIN_HOME/wallet/server

#========================================================================
# pcm_em_proto_vers
#
# To support zero downtime upgrade when SSL is enabled
#
#========================================================================
#- cm-em pcm_em_proto_vers 0
