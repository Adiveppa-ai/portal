#-----------------------------------------------------------------#
# This file contains the configuration information necessary for  #
# pin_multidb installation script.  Please modify primary and	  #
# secondary db description sections accordingly			  #
#-----------------------------------------------------------------#
					#------------------------
					# Installation Location
					#------------------------
$PIN_MD_SQL_PLATFORM = 'Oracle';	

$PIN_MD_SQL_BASE = $ENV{ORACLE_HOME};	# You can change this to be 
					# the absolute path of your 
					# oracle home.
					# For DB2, you have to change
					# this entry to be the absolute
					# path of your DB2 sqllib directory.

$PIN_HOME = $ENV{PIN_HOME};

$PIN_LOG = $ENV{PIN_LOG};

if ($PIN_MD_SQL_PLATFORM =~ /Oracle/) {
  $PIN_MD_DB_DM_TYPE = "dm_oracle";
  $PIN_MD_SQLPLUS      = 'sqlplus';
  $JDBC_URL_PREFIX = "jdbc:oracle:oci8:\@";
  $JDBC_JAR_FILE = "$PIN_MD_SQL_BASE/jdbc/lib/ojdbc8.jar";
  # When using Oracle 19c or above instant client update the path to JDBC jar.
  #$JDBC_JAR_FILE = "$PIN_MD_SQL_BASE/lib/ojdbc8.jar";
} elsif($PIN_MD_SQL_PLATFORM =~ /MSSQL/i) {
  $PIN_MD_DB_DM_TYPE = "dm_odbc";
  $PIN_MD_SQLPLUS      = 'osql';
} elsif ($PIN_MD_SQL_PLATFORM =~ /DB2/i) {
  $PIN_MD_DB_DM_TYPE = "dm_db2";
  $PIN_MD_SQLPLUS      = 'db2';
  $JDBC_URL_PREFIX = "jdbc:db2:";
  $JDBC_JAR_FILE = "$PIN_MD_SQL_BASE/java/db2java.zip";
}


if ($^O !~ /win/i) { 
  $PIN_MD_INFRANET_BASE   = "$PIN_HOME";
  $PIN_MD_INFRANET_LOGS   = "$PIN_LOG/multi_db";
  $PIN_MD_DM_DB_START_CMD = "$PIN_MD_INFRANET_BASE/bin/start_$PIN_MD_DB_DM_TYPE";
  $PIN_MD_CM_START_CMD    = "$PIN_MD_INFRANET_BASE/bin/start_cm";
  $PIN_MD_DM_DB_STOP_CMD  = "$PIN_MD_INFRANET_BASE/bin/stop_$PIN_MD_DB_DM_TYPE";
  $PIN_MD_CM_STOP_CMD     = "$PIN_MD_INFRANET_BASE/bin/stop_cm";
  $JAVA = "$ENV{JAVA_HOME}/bin/java";
} elsif ($^O =~ /win/i) {
  $PIN_MD_INFRANET_BASE   = "$PIN_HOME";
  $PIN_MD_INFRANET_LOGS   = "$PIN_LOG/multi_db";
  $PIN_MD_DM_DB_START_CMD = "$PIN_MD_INFRANET_BASE/bin/startserv DM";
  $PIN_MD_CM_START_CMD    = "$PIN_MD_INFRANET_BASE/bin/startserv cm";
  $PIN_MD_DM_DB_STOP_CMD  = "$PIN_MD_INFRANET_BASE/bin/stopserv DM";
  $PIN_MD_CM_STOP_CMD     = "$PIN_MD_INFRANET_BASE/bin/stopserv cm";
  $JAVA = "$ENV{JAVA_HOME}/bin/java";
}
$PIN_MD_CM_PINCONF    	 = "$PIN_MD_INFRANET_BASE/sys/cm/pin.conf";
$PIN_MD_MULTIDB_PINCONF    = 
		"$PIN_MD_INFRANET_BASE/apps/multi_db/pin.conf";

$PIN_MD_SCRIPT_LOCATION  = 
		"$PIN_MD_INFRANET_BASE/sys/$PIN_MD_DB_DM_TYPE/data";		
$PIN_MD_TESTNAP_LOCATION = "$PIN_MD_INFRANET_BASE/bin"; 
$JAR_DIR="$PIN_MD_INFRANET_BASE/jars";


$PIN_RESET_SEQ_JAR_FILE = 
		"$PIN_MD_INFRANET_BASE/jars/pin_reset_seq.jar";		
$PCM_JAR_FILE = 
		"$PIN_MD_INFRANET_BASE/jars/pcm.jar";		
$ORACLEPKI_JAR_FILE = 
		"$PIN_MD_INFRANET_BASE/jars/oraclepki.jar";		

						#multi_db_synch_dd executable
						#location
$PIN_MD_SYNCH_DD_LOCATION         = "$PIN_MD_INFRANET_BASE/bin";
						# pin_confirm_logins executable
						# location
$PIN_MD_CONFIRM_LOGINS_LOCATION = "$PIN_MD_INFRANET_BASE/bin";

						# pin_confiig_distribution
						# executable location
$PIN_MD_CONFIG_DISTRIBUTION_LOCATION         = "$PIN_MD_INFRANET_BASE/bin";

						#load_config_dist executable
						#location
$PIN_MD_CONFIG_DIST_LOCATION         = "$PIN_MD_INFRANET_BASE/bin";

						#load_pin_uniqueness 
						#location
$PIN_MD_LOAD_PIN_UNIQUENESS_LOCATION         = "$PIN_MD_INFRANET_BASE/bin";

$PIN_MD_APPS_MULTIDB_LOCATION        = "$PIN_MD_INFRANET_BASE/apps/multi_db";

					#-------------------------
					# Common Information
					#-------------------------
$PIN_MD_CM_HOST = $MAIN_CM{'hostname'};
$PIN_MD_CM_PORT = $MAIN_CM{'port'};

					#-------------------------
					# Primary db information  
					#-------------------------
$PIN_MD_PRIMARY_DBNO     = "0.0.0.1";
$PIN_MD_PRIMARY_OWNER    = uc($MAIN_DB{'user'});	#for DB2, this has to be upper case
#$PIN_MD_PRIMARY_PASSWD   = "pin";
$PIN_MD_PRIMARY_DBNAME   = uc($MAIN_DB{'alias'}); #for DB2, this has to be upper case
$PIN_MD_PRIMARY_SQLHOST  = "";			# specify for sqlserver
$PIN_MD_PRIMARY_HOSTNAME = $MAIN_DB{'Host'};
$PIN_MD_PRIMARY_PORT     = $DM_ORACLE{'port'};
# The following 6 entries are for DB2 only
$PIN_MD_PRIMARY_BUFFERPOOL = "BUFFER_POOL_32K";  
$PIN_MD_PRIMARY_PAGESIZE = "32K";
$PIN_MD_PRIMARY_CDTSNAME = "INFCD";	# this has to be upper case
$PIN_MD_PRIMARY_CNTLTSNAME = "INFCNTL"; # this has to be upper case
$PIN_MD_PRIMARY_UOWTSNAME = "INFUOW";	# this has to be upper case
$PIN_MD_PRIMARY_TBLSPACEDIR = "$PIN_MD_INFRANET_BASE/DB2/CTABLESPACE"; # this has to be upper case
#$PIN_MD_PRIMARY_BACKUP_DBNAME   = "BACKUPDB";	#backup DB of primary DB, RAC system ONLY
					

#
# Details regarding the Distribution database.
# Only Central Publisher topology is supported
# Publisher and the Distributor hosts should be same
#

$PIN_MD_DISTRIBUTOR_LOGIN = "pin";			# specify for sqlserver
$PIN_MD_DISTRIBUTOR_PASSWD = "pin";			# specify for sqlserver
$PIN_MD_DISTRIBUTOR_SQLHOST = $PIN_MD_PRIMARY_SQLHOST;  

  #-----------------------------------------------------------#
  #  Please specify the secondary db information in the       #
  #  following blocks.  Please notice the array notation and  #
  #  when adding new db,  increment the array index           #
  #  accordingly.  For example, if you have a third db        #
  #  then the db_no will be specified in 		      #
  #  $PIN_MD_SECONDARY_DBNO [1] etc..			      #
  #-----------------------------------------------------------#

#-----------------------------------------------------------
# The following two entry specifies the starting and ending
# secondary DB instances to be added into MultiDB environment.
# For example, if want to add a fourth secondary DB to
# an existing MultiDB env, START_INST and END_INST should
# both be "3".
#------------------------------------------------------------ 
$PIN_MD_SECONDARY_START_INST	= "0";
$PIN_MD_SECONDARY_END_INST	= "0";

                                        #-------------------------
                                        # Secondary db information
                                        #-------------------------

$PIN_MD_SECONDARY_DBNO     [0] = "0.0.0.2";
$PIN_MD_SECONDARY_OWNER    [0] = "__MUTI_SEC_OWNER__"; # for DB2, this has to be upper case
#$PIN_MD_SECONDARY_PASSWD   [0] = "pinb"; 
$PIN_MD_SECONDARY_DBNAME   [0] = "__MULTI_SEC_DBNAME__"; # for DB2, this has to be upper case
$PIN_MD_SECONDARY_SQLHOST  [0] = "";		# specify for sqlserver
$PIN_MD_SECONDARY_HOSTNAME [0] = "__MULTI_SEC_HOSTNAME__";	
$PIN_MD_SECONDARY_PORT     [0] = "__MULTI_SEC_DM_PORT__";	# dm port	

# The following 2 entries are for secondary schema.
# These entries are required for the views to be created in sec schema 

$PIN_MD_SECONDARY_PARENT_DBNO[0] = "0.0.0.1";	 
	
$PIN_MD_SECONDARY_PARENT_SCHEMA[0] =  uc($MAIN_DB{'user'});

# The following 6 entries are for DB2 only
$PIN_MD_SECONDARY_BUFFERPOOL[0] = "BUFFER_POOL_32K"; 
$PIN_MD_SECONDARY_PAGESIZE[0] = "32K";
$PIN_MD_SECONDARY_CNTLTSNAME[0] = "INFCNTL2"; # this has to be upper case
$PIN_MD_SECONDARY_TBLSPACEDIR[0] = "$PIN_MD_INFRANET_BASE/DB2/CTABLESPACE"; # this has to be upper case
$PIN_MD_CONTROL_DBNAME   [0] = "SECONDDB"; # this has to be upper case
$PIN_MD_APPLYQUAL = "SECPINDBQ"; 

#-------------------------------------------------------------
# If you are using DNA in the multi DB environment and your 
# database platform is SQL server, the following information
# need to be specified for every secondary database.
#-------------------------------------------------------------

$PIN_DNA_DISTRIBUTOR_LOGIN [0] = "pin";
$PIN_DNA_DISTRIBUTOR_PASSWD [0] = "pin";
$PIN_DNA_DISTRIBUTOR_SQLHOST [0] = $PIN_MD_SECONDARY_SQLHOST [0];

#----------------------------------------------------------------------
# If you plan on not using uniqueness replication, then remove it from
# the groups here. Uniqueness will then only exist on the primary db.
# This option is for oracle users only.
#----------------------------------------------------------------------
@PIN_MD_REFRESH_GROUPS = ("CONFIG",
			  "PRICE",
			  "UNIQUENESS",
			  "GENERAL");

#-----------------------------------------------------------------
# Refresh intervals for the various refresh groups
#-----------------------------------------------------------------

$PIN_MD_CONFIG_REF_UNIT = "Days";
$PIN_MD_CONFIG_REF_INTERVAL = "10";

				#-----------------------
				# The following two entries
				# will be ignored if 
				# UNIQUENESS is not in 
				# PIN_MD_REFRESH_GROUPS
				#-----------------------
$PIN_MD_UNIQUENESS_REF_UNIT = "Hours";
$PIN_MD_UNIQUENESS_REF_INTERVAL = "6";

$PIN_MD_PRICE_REF_UNIT = "Hours";
$PIN_MD_PRICE_REF_INTERVAL = "24";

$PIN_MD_GENERAL_REF_UNIT = "Hours";
$PIN_MD_GENERAL_REF_INTERVAL = "24";

					#------------------------
					# Login Frequency
					# (in minutes)
					#------------------------
$PIN_MD_CONFIRM_LOGIN_FREQ = "10";
					#------------------------
					# Min Delay before confirming 
					# new uniqueness entry
					# (in minutes)
					#------------------------
$PIN_MD_CONFIRM_LOGIN_VALID_DELAY = "10";
					#------------------------
					# Do we store account_no
					# in uniqueness entry
					#------------------------
$PIN_MD_CONFIRM_LOGIN_USE_ACCT_NO = "1";
					#------------------------
					# Config Distribution 
					# Frequency (in hours)
					#------------------------
$PIN_MD_CONFIG_DIST_FREQ  = "12";
					#------------------------
					# SQL source files
					#------------------------

if ($PIN_MD_SQL_PLATFORM =~ /Oracle/i) {
   $PIN_MD_PRIMARY_CREATE_INDEXES = "create_md_primary_indexes.source";
   $PIN_MD_PRIMARY_PRE_INIT_SCRIPT  = "create_md_primary_init.source";
   $PIN_MD_PRIMARY_INIT_UNIQ_SCRIPT = "create_md_primary_uniqueness.source";
   $PIN_MD_PRIMARY_INIT_SCRIPT  = "create_md_primary.source";
   $PIN_MD_SECONDARY_INIT_SCRIPT     = "create_md_secondary.source";
   $PIN_MD_SECONDARY_SCHEMA_INIT_SCRIPT = "create_md_grant_schema.source";
   $PIN_MD_SECONDARY_SCHEMA_SCRIPT = "create_md_secondary_schema_view.source";
   $PIN_MD_SECONDARY_SNAPSHOT_SCRIPT = "create_md_snapshots.source";
   $PIN_MD_SECONDARY_DROP_SCRIPT = "drop_md_secondary_refresh.source";
   $PIN_MD_SECONDARY_TRIGGER_SCRIPT = "create_md_triggers.source";
}
elsif ($PIN_MD_SQL_PLATFORM =~ /DB2/i) {

   $PIN_MD_DB2_CREATE_MAPPING   = "create_md_mapping_db2.source";
   $PIN_MD_DB2_RENAME           = "rename_md_db2.source";
   $PIN_MD_DB2_VIEW_ON_RENAME   = "create_md_views_on_rename_db2.source";
   $PIN_MD_DB2_CREATE_TABLE     = "create_md_tables_db2.source";
   $PIN_MD_DB2_POPULATE_TABLE   = "populate_md_new_tables_db2.source";
   $PIN_MD_DB2_CREATE_INDEX     = "create_md_indexes_db2.source";
   $PIN_MD_DB2_VIEW_ON_NEWTABLE = "create_md_view_on_newtables_db2.source";
   $PIN_MD_DB2_CREATE_PRIMARY_KEY= "create_md_primary_keys_db2.source";

   $PIN_MD_DB2_PRIMARY_TABSPACE = "create_md_primary_tblspace_db2.source";
   $PIN_MD_DB2_PRIMARY_CTRL_TABLE= "create_md_primary_ctltbls_db2.source";
   $PIN_MD_DB2_PRIMARY_REGISTER = "register_md_primary_tbls_db2.source";
   $PIN_MD_DB2_PRIMARY_ALTER    = "alter_md_primary_tbls_db2.source";

   $PIN_MD_DB2_SECONDARY_TABSPACE = "create_md_secondary_tblspace_db2.source";
   $PIN_MD_DB2_SECONDARY_CTRL_TABLE= "create_md_secondary_ctltbls_db2.source";
   $PIN_MD_DB2_SECONDARY_CONFIGSET = "create_md_configset_db2.source";
   $PIN_MD_DB2_SECONDARY_PRICESET = "create_md_priceset_db2.source";
   $PIN_MD_DB2_SECONDARY_UNIQUENESSSET = "create_md_uniquenessset_db2.source";
   $PIN_MD_DB2_SECONDARY_GENERALSET = "create_md_generalset_db2.source";
   $PIN_MD_DB2_SECONDARY_TRIGGER    = "create_md_triggers_db2.source";

   $PIN_MD_DB2_CLEANUP_DROP_CTL_TBS     = "cleanup_md_drop_ctrl_tbspace_db2.source";
   $PIN_MD_DB2_CLEANUP_DROP_VIEW        = "cleanup_md_drop_views_db2.source";
   $PIN_MD_DB2_CLEANUP_RECREATE_TABLE   = "cleanup_md_recreate_tbls_db2.source";
   $PIN_MD_DB2_CLEANUP_POPULATE_TABLE   = "cleanup_md_populate_tbls_db2.source";
   $PIN_MD_DB2_CLEANUP_ALTER   = "cleanup_md_alter_primary_db2.source";
   $PIN_MD_DB2_CLEANUP_RENAME   = "cleanup_md_rename_db2.source";
}

1;
