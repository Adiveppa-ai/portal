########################################
# event_start_time_stamp
#
# Date/Time timestamp of the event
# The format of the date/time stamp is
# MM/DD/YYYY HH:MM:SS
# where HH is in 24 hour mode.
# example event_start_time_stamp 04/24/2002 17:07:00
########################################
event_start_time_stamp 12/15/2001 17:07:00

########################################
# event_end_time_stamp
#
# Date/Time timestamp of the event
# The format of the date/time stamp is
# MM/DD/YYYY HH:MM:SS
# where HH is in 24 hour mode.
# example event_start_time_stamp 04/24/2002 17:07:00
########################################
event_end_time_stamp 6/20/2002 17:07:00

