#
# JDBC Connection Pool
# --------------------
#

# The BRM database schema number (if not defined, it will be assumed to be 1). The following entries may
# subsequently be determined by the schema number in multi-schema deployments (appending '.<schema>'):
#
#    connenctionURL.x     - Schema-specific database service configuration
#    user.x               - Schema-specific user (schema) name.
#    password.x           - Schema-specific password (if not using wallet)
#    wallet_entry_name.x  - Schema-specific wallet reference (if using wallet)
#
#rated_event_manager.dbno = 1

# The BRM database connection URL (see 'rated_event_manager.dbno'). A connection is required to the appropriate BRM database service
# for each schema.
rated_event_manager.jdbc_pool.connectionURL = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB
#rated_event_manager.jdbc_pool.connectionURL.1 = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB1
#rated_event_manager.jdbc_pool.connectionURL.2 = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB2
#rated_event_manager.jdbc_pool.connectionURL.3 = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB3
#...

# The BRM database user name
rated_event_manager.jdbc_pool.user = pin
#rated_event_manager.jdbc_pool.user.1 = pin1
#rated_event_manager.jdbc_pool.user.2 = pin2
#rated_event_manager.jdbc_pool.user.3 = pin3

# The BRM wallet and entry to locate the BRM database password.
rated_event_manager.jdbc_pool.wallet_location = ${BRM_CONF_WALLET}
rated_event_manager.jdbc_pool.wallet_entry_name = infranet.rel.password
#rated_event_manager.jdbc_pool.wallet_entry_name.1 = infranet.rel.password.1
#rated_event_manager.jdbc_pool.wallet_entry_name.2 = infranet.rel.password.2
#rated_event_manager.jdbc_pool.wallet_entry_name.3 = infranet.rel.password.3

# Whether to validate the BRM schema on pool creation. This will check the account_t root account entry to
# ensure the schema actually matches with the expected configuration.
rated_event_manager.jdbc_pool.validateSchema = true

# The initial number of connections to create in the pool
rated_event_manager.jdbc_pool.initialPoolSize = 1

# The minimum number of connections which will generally be maintained event when idle
rated_event_manager.jdbc_pool.minPoolSize = 1

# The maximum number of connections which are permitted in the pool at any one time
rated_event_manager.jdbc_pool.maxPoolSize = 50

# The maximum amount of time (in seconds) that one may way for a connection
rated_event_manager.jdbc_pool.connectionWaitTimeout = 10

# Validate the connection when retrieving from the pool?
rated_event_manager.jdbc_pool.validateConnectionOnBorrow = false

# If connection validation is enabled, the SQL to execute to validate the connection is OK
rated_event_manager.jdbc_pool.sqlForValidateConnection = SELECT SYSDATE FROM DUAL

# Is FCF enabled?
rated_event_manager.jdbc_pool.fastConnectionFailoverEnabled = false

# If FCF is enabled, set the Oracle Notification Services (ONS) configuration. E.g. "nodes=racnode1:4200,racnode2:4200"
rated_event_manager.jdbc_pool.onsConfiguration =

# The maximum number of database statements that can be cached
rated_event_manager.jdbc_pool.maxStatements = 50

# Should UCP JMX metrics be enabled?
rated_event_manager.jdbc_pool.jmxEnabled = true

# How frequently should UCP metrics be updated (in seconds)
rated_event_manager.jdbc_pool.metricUpdateInterval = 10

# What log-level should the UCP logging be set to initially?
rated_event_manager.jdbc_pool.poolLogLevel = INFO

# 
# Non-Transient error code configuration. These provide a means of defining what errors are persistent and are therefore
# not able to be retried (as opposed to transient errors which may succeed if retried). This list can be extended with any
# Oracle Database error codes which may be encountered - typically these may be some form of data-error in CDR inforrmation
# generated by REF:
#
#   ORA-00001: unique constraint (xxx) violated
#   ORA-01450: Maximum Key Length (xxx) Exceeded
#   ORA-12899: value too large for column XXX (actual: YY, maximum: ZZ)
#   ORA-01722: invalid number
#   ORA-20010: Error -20010 occurred in the preupdate procedure ...
#   ORA-01489: result of string concatenation is too long
#   ORA-06550: line 1, column 7: PLS-00306: wrong number or types of arguments in call to 'PIN_REL_PRE_UPDATER_SP' ...
#
rated_event_manager.jdbc_pool.nonTransientErrorCodes = 1,1450,12899,1722,20010,1489,6550

# SSL DB configuration

rated_event_manager.jdbc_pool.dbSSLEnabled = false
rated_event_manager.jdbc_pool.dbSSLClientAuth = false
rated_event_manager.jdbc_pool.sslTrustStoreLocation = __DB_SSL_TRUSTSTORE_LOC__/cwallet.sso
rated_event_manager.jdbc_pool.sslKeyStoreLocation = __DB_SSL_KEYSTORE_LOC__/cwallet.sso
#rated_event_manager.jdbc_pool.wallet_entry_name.sslTrustStorePwd=infranet.rel.db.ssl.truststore.password
#rated_event_manager.jdbc_pool.wallet_entry_name.sslKeyStorePwd=infranet.rel.db.ssl.keystore.password

#
# REM Global settings
# -------------------
#

# The directory where SQL-Loader control files will be located. This is not required for ZIP file processing (as the control
# file data is part of the ZIP archive).
rated_event_manager.control_file_dir = ${HOME}/data/cdr_files

# The 'semaphore' filename which REM monitors to determine whether to cease processing or not.
rated_event_manager.stop_semaphore_filename = ${PIN_LOG_DIR}/rated_event_manager/rem.stop

# The global maximum thread-pool size for all loading threads (those used to do inserts into BRM tables). This set of threads
# is shared amongst all types of processor (CDR, ZIP_DB, ZIP_FILE, etc.) so represents a maximum capacity for a given REM
# process.
rated_event_manager.load_thread_capacity = 30

# The global maximum thread-pool ize for all updater threads (pre-updater and updater). These threads are used to invoke the
# pre-updater and updater stored procedures and are shared amongst all types of processor, thus representing a maximum
# capacity for a given REM process.
rated_event_manager.update_thread_capacity = 20

# Whether to use direct-path loading or not (sets the /*+ APPEND_VALUES */ hint for inserts). This can improve loading performance
# and reduce REDO although will tend to reduce concurrency (as only one session at a time can insert above the high-water mark).
# Please read the Oracle Database documentation concerning the implications of direct-path loading.
rated_event_manager.direct_path_loading = false
rated_event_manager.http_health_check_handler.healthCheckHandlerPort = 8989

# Controls the default max number of events a given thread will load, before invoking parallel loads
rated_event_manager.default_max_events_per_table = 50000

# Controls the per-table max number of events a given thread will load. If more events are retrieved than
# this number, the load will be divided into multiple threads which may, if the 'load_thread_capacity' is
# sufficient, permit multiple threads to load data in parallel.
#rated_event_manager.max_events_per_table = table_name:max_events_per_thread


#
# Directory Processor Settings
# ----------------------------
# 
# The 'directory_processor' settings are for loading CDR files (or zipped CDR files). There can be specific configurations for
# different file types.
#
# E.g. 'rated_event_manager.directory_processor.gprs' or 'rated_event_manager.directory_processor.gsm'
#
# It usually sufficient to configure a single 'default' entry that will handle all types of file.
#
# NOTE: ECE uses the last sub-class component of the /event POID to determine the 'type' 
#

# The directory in which the ECE CDR header files will be found (this directory is monitored for files)
rated_event_manager.directory_processor.default.header_dir = ${HOME}/data/cdr_files

# The regular expression used to match CDR files to load
rated_event_manager.directory_processor.default.header_expr = ^BRMCDR_.*.(out|zip)$

# The directory in which CDR data files will be present (this is not required for ZIP files)
rated_event_manager.directory_processor.default.data_dir = ${HOME}/data/cdr_files

# The frequency with which the header directory is checked for new data if there are no files currently to process
rated_event_manager.directory_processor.default.frequency = 5

# The maximum number of files which can be processed (in parallel) at any one time
rated_event_manager.directory_processor.default.concurrent_files = 1

# The creation process (stored on /batch/rel and used by the updater procedure - do not change)
rated_event_manager.directory_processor.default.creation_process = RATING_PIPELINE

# The Object Cache Type for data being loaded (for backwards compatability with REL - do not change)
rated_event_manager.directory_processor.default.object_cache_type = 2

#
# The thread counts for the updater can be dynamically determined based on the size of the file that
# is being processed. The configuration is a list of pairs of the form '<threshold> : <threads>', with each of
# the pairs separated by a comma. Consecutive entries in the list (ordeded by threshold) will determine the ranges.
# So the following example:
#
#   num_events >=      0 && <  10000 => 1 thread
#   num_events >=  10000 && <  50000 => 2 thread
#   num_events >=  50000 && < 100000 => 3 thread
#   num_events >= 100000 && < 100000 => 4 thread
#
# Would be enabled using the following (spaces are optional):
#
#   "0 : 1, 10000 : 2, 50000 : 3, 100000 : 4"
#
# A simple fixed numeric value can also be used, if desired.
#
rated_event_manager.directory_processor.default.updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4

# The stored procedure for balance update processing (this is optional) ...
rated_event_manager.directory_processor.default.updater_proc_name = pin_rel.pin_rel_updater_sp

# The flag value passed to the updater to control ability to create items 'on-the-fly' (1 = yes, 0 = no)
# This should usually be set to un unless pre-created items are being used.
rated_event_manager.directory_processor.default.updater_flags = 1

# The number of events which will be processed in each single update transaction. Larger values generally help
# improve performance (reducing the number of commits/DB operations), but may result in more contention with other
# BRM applications as more balance-groups are locked in each transaction.
rated_event_manager.directory_processor.default.updater_batch_size = 25

# Provides an upper-limit on the time the updater procedure may execute. The updater will be interrupted and a rollback
# performed if it takes too long to execute. Defined in seconds.
rated_event_manager.directory_processor.default.updater_timeout_seconds = 60

# The pre-updater stored procedure which is invoked prior to balance updates
rated_event_manager.directory_processor.default.pre_updater_proc_name = pin_rel.pin_rel_pre_updater_sp

# The number of threads for the pre-updater process (see 'updater_threads' for more information)
rated_event_manager.directory_processor.default.pre_updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4

# The flag value passed to the pre_updater to control ability to create items 'on-the-fly' (1 = yes, 0 = no)
rated_event_manager.directory_processor.default.pre_updater_flags = 1

# The number of events to process in each commit in the pre-updater process (see 'updater_batch_size' for more information)
rated_event_manager.directory_processor.default.pre_updater_batch_size = 25

# The timeout for pre-updater procedure execution (in seconds)
rated_event_manager.directory_processor.default.pre_updater_timeout_seconds = 60

# The number of rows that will be batched when inserting into event tables. Larger values will tend (up to a point) to reduce
# the number of DB roundtrips and improve throughput.
rated_event_manager.directory_processor.default.insert_batch_size = 250

# The timeout for insert batches (in seconds)
rated_event_manager.directory_processor.default.insert_timeout_seconds = 30

# The number of rows that will be loaded between individual commits on the database. Larger values will tend (up to a point)
# to reduce commits on the database and improve throughput.
rated_event_manager.directory_processor.default.commit_batch_size = 250


# Determines whether an event's start_time (or end_time - default) is used to determine whether we're in the delay period or not.
rated_event_manager.directory_processor.default.use_end_time = true

# Enable procedure output to be collected into the log file. A value >= 0 defines the server-output size on the Oracle DB server
# and enables output to be collected and recorded. The output will be visible as DEBUG level logging in the REM diagnostic logger.
# A value of < 0 will disable diagnostic debugging. A size of 0 implies the Oracle serveroutput buffer will be unlimited in size.
rated_event_manager.directory_processor.default.enable_serveroutput = 0

#
# Determines what to do with files upon successful loading. The following options are available:
#
#    move   - Move all files to the specified 'target_directory'
#    rename - Rename all files by appending the configured 'postfix' to the filenames
#    delete - Delete all the files
#    noop   - Leave files in the processing directory
#
rated_event_manager.directory_processor.default.success.mode = move

# The target directory to which successfully processed files will be moved
rated_event_manager.directory_processor.default.success.target_directory = ${HOME}/data/cdr_files_archives

# The post-processing mode for files which are not successfully processed
rated_event_manager.directory_processor.default.failure.mode = move

# The target directory for files which are not successfully processed
rated_event_manager.directory_processor.default.failure.target_directory = ${HOME}/data/cdr_files_reject

#
# Zip DB Processor Settings
# -------------------------
#
# The 'zip_processor' settings are for loading CDR files which have been transferred to BRM as a ZIP stored in a BLOB in the
# BRM database (see the batch_rel_zip_file_t table). The majority of settings are identical to the other processors (see the
# 'directory_processor' configuration for more infomration)
#

# The number of threads which will be used to retrieve ZIP data from the BRM database. This number can be increaed if reading
# data from the database becomes a bottleneck.
rated_event_manager.zip_processor.zip1.num_threads = 1

# The number of ZIP file 'sessions' which may be retrieved for processing at any one time.
rated_event_manager.zip_processor.zip1.sessions_per_fetch = 5

# The number of files which may be loaded at any one time - greater concurrency will (up to a point) increase throughput
rated_event_manager.zip_processor.zip1.concurrent_files = 2

# The frequency with which searches will be done for data to process (when there is no data).
rated_event_manager.zip_processor.zip1.frequency = 5
rated_event_manager.zip_processor.zip1.creation_process = RATING_PIPELINE
rated_event_manager.zip_processor.zip1.object_cache_type = 2
rated_event_manager.zip_processor.zip1.updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4
rated_event_manager.zip_processor.zip1.delete_zip_after_load = false
rated_event_manager.zip_processor.zip1.updater_proc_name = pin_rel.pin_rel_updater_sp
rated_event_manager.zip_processor.zip1.updater_flags = 1
rated_event_manager.zip_processor.zip1.updater_batch_size = 25
rated_event_manager.zip_processor.zip1.updater_timeout_seconds = 60
rated_event_manager.zip_processor.zip1.pre_updater_proc_name = pin_rel.pin_rel_pre_updater_sp
rated_event_manager.zip_processor.zip1.pre_updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4
rated_event_manager.zip_processor.zip1.pre_updater_flags = 1
rated_event_manager.zip_processor.zip1.pre_updater_batch_size = 25
rated_event_manager.zip_processor.zip1.pre_updater_timeout_seconds = 60
rated_event_manager.zip_processor.zip1.insert_batch_size = 250
rated_event_manager.zip_processor.zip1.insert_timeout_seconds = 30
rated_event_manager.zip_processor.zip1.commit_batch_size = 250
rated_event_manager.zip_processor.zip1.use_end_time = true
rated_event_manager.zip_processor.zip1.enable_serveroutput = 0

#
# Retry Processor Settings
# ------------------------
#
# The 'retry_processor' handles request for re-processing of failed loading attempts (typically scheduled by the
# REL Manager process). This permits updater failures to be re-tried without having to manage files on the BRM
# server. The requests for retry are retrieved from the batch_rel_retry_t table. Behaviour is similar to the ZIP
# DB Processor.
#
rated_event_manager.retry_processor.retry1.num_threads = 1
rated_event_manager.retry_processor.retry1.sessions_per_fetch = 5
rated_event_manager.retry_processor.retry1.header_dir = ${HOME}/data/cdr_files
rated_event_manager.retry_processor.retry1.data_dir = ${HOME}/data/cdr_files
rated_event_manager.retry_processor.retry1.concurrent_files = 1
rated_event_manager.retry_processor.retry1.frequency = 5
rated_event_manager.retry_processor.retry1.creation_process = RATING_PIPELINE
rated_event_manager.retry_processor.retry1.object_cache_type = 2
rated_event_manager.retry_processor.retry1.updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4
rated_event_manager.retry_processor.retry1.updater_proc_name = pin_rel.pin_rel_updater_sp
rated_event_manager.retry_processor.retry1.updater_flags = 1
rated_event_manager.retry_processor.retry1.updater_batch_size = 25
rated_event_manager.retry_processor.retry1.updater_timeout_seconds = 60
rated_event_manager.retry_processor.retry1.pre_updater_proc_name = pin_rel.pin_rel_pre_updater_sp
rated_event_manager.retry_processor.retry1.pre_updater_threads = 0 : 1, 10000 : 2, 50000 : 3, 100000 : 4
rated_event_manager.retry_processor.retry1.pre_updater_flags = 1
rated_event_manager.retry_processor.retry1.pre_updater_batch_size = 25
rated_event_manager.retry_processor.retry1.pre_updater_timeout_seconds = 60
rated_event_manager.retry_processor.retry1.insert_batch_size = 250
rated_event_manager.retry_processor.retry1.insert_timeout_seconds = 30
rated_event_manager.retry_processor.retry1.commit_batch_size = 250
rated_event_manager.retry_processor.retry1.use_end_time = true
rated_event_manager.retry_processor.retry1.enable_serveroutput = 0
rated_event_manager.retry_processor.retry1.success.mode = move
rated_event_manager.retry_processor.retry1.success.target_directory = ${HOME}/data/cdr_files_archives
rated_event_manager.retry_processor.retry1.failure.mode = move
rated_event_manager.retry_processor.retry1.failure.target_directory = ${HOME}/data/cdr_files_reject

