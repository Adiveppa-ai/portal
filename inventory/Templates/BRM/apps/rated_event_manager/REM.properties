#ref.jdbc_pool.connectionURL.2 = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB2
#ref.jdbc_pool.connectionURL.3 = jdbc:oracle:thin:@//${HOSTNAME}:1521/PINDB3
