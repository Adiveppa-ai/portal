#To enable OAUTH Validation in OAM12c ,configure the following OAUTH parameters
#infranet.OAuthIDP=OAM12c
#infranet.OAuthAccessTokenUrl=http://<oam_managed_server_hostname>:<oam_managed_server_port>/oauth2/rest/token/info
#infranet.OAuthDomainName=<OamIdDomainName>


# To enable OAuth validation OAM11g , configure following OAuth parameters.
# OAuth validator related entries
#**********************************************************************************************
# The OAuth validation is performed by a OAM client, register a client on OAM server,
# and configure following client info.
#**********************************************************************************************  
#infranet.OAuthIDP=OAM11g

#infranet.OAuthAccessTokenUrl=http://ip address of OAM server:port#/ms_oauth/oauth2/endpoints/oauthservice/tokens
#infranet.OAuthClientId= Set Client id, which is added to act as OAuth validator
#infranet.OAuthClientSecret= set encrypted client secret 


# To enable OAuth validation with IDCS , configure following OAuth parameters.
# OAuth validator related entries
#**********************************************************************************************
# The OAuth validation is performed by a IDCS client, register a client on IDCS server,
# and configure following client info.
#**********************************************************************************************  
#infranet.OAuthIDP=IDCS

#infranet.OAuthAccessTokenUrl=http://ip address of IDCS server:port#/oauth2/v1/introspect
#infranet.OAuthClientId= Set Client id, which is added to act as OAuth validator
#infranet.OAuthClientSecret= set encrypted client secret 
#infranet.wallet.location=<set the location of the wallet to read clientSecret and clientId>

#OAuth default Grant properties
#Keep follwoing as defualt unless there are some changes in grant type or token action
#*********************************************************************************************
infranet.OAuthGrantType=oracle-idm%3A%2Foauth%2Fgrant-type%2Fresource-access-token%2Fjwt
infranet.OAuthTokenAction=validate

#Oauth introspection Parameters(oracle_token_attrs_retrieval)
#OAuth introspection is the same as access token validation but additional claims data is included inside the access token as part of the response.
#includes following prams with space :
#iss aud exp prn jti exp iat oracle.oauth.scope oracle.oauth.client_origin_id
#Refer oracle doc for more info on Oauth Introspection
infranet.OAuthTokenAttributes=iss%20aud%20exp%20prn%20jti%20exp%20iat%20oracle.oauth.scope%20oracle.oauth.client_origin_id%20oracle.oauth.user_origin_id%20oracle.oauth.user_origin_id_type%20oracle.oauth.tk_context%20oracle.oauth.id_d_id%20oracle.oauth.svc_p_n

# Modify following scope prefix,
#Use your resource id as a prefix. The resource id is a default prefix for all available scopes of a certain resource. 
# if an additional prefix is set in OAM,then resource scope prefix should be set appropriately.
#BRM OAuth resource scope definition /Example -
#BrmWebService should be configured as a resource in OAM,
#and may define all available webservices as allowed scope with a certain prefix
#For example -  scope = BRMWSM.BRMBalServices_v2, BRMWSM.BRMBillServices_v2 ;
#where BRMWSM is prefix(resource id/name) and BRMBalServices_v2 is the Webservice name as available in the BRMWebService Manager.
#*********************************************************************************************
infranet.ResourceScopePrefix=BRMWSM
