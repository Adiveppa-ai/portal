#
# /batch/rel list ...
#
TABLE=rel_manager.batch_rel_list
   #COLUMN=BOTH;poid_db;0.0.0.%-2.2s;10;%s;Dbno;LEFT;none
   COLUMN=BOTH;poid_id0;%12d;14;%d;Poid;RIGHT;none
   COLUMN=BOTH;mod_time;%-19.19s;21;%s;Mod Time;LEFT;none
   COLUMN=BOTH;input_file_name;%-60.60s;62;%s;Input Filename;LEFT;none
   COLUMN=BOTH;status;%6d;8;%d;Status;RIGHT;none
   COLUMN=BOTH;state;%-18.18s;20;%s;State;LEFT;none
   COLUMN=BOTH;num_total_records;%8d;10;%d;Records;RIGHT;SUM
   COLUMN=BOTH;start_time;%-19.19s;21;%s;Start Time;LEFT;none
   COLUMN=BOTH;end_time;%-19.19s;21;%s;End Time;LEFT;none
   COLUMN=BOTH;is_zip;%-6.6s;8;%s;Is ZIP?;LEFT;none
#
# /batch/rel daily summary ...
#
TABLE=rel_manager.batch_summary
   COLUMN=BOTH;processed_str;%-13.13s;15;%s;Day Processed;LEFT;NONE
   COLUMN=BOTH;status;%6d;8;%d;Status;RIGHT;NONE
   COLUMN=BOTH;state;%-18.18s;20;%s;State;LEFT;NONE
   COLUMN=BOTH;row_count;%10d;12;%d;Files;RIGHT;SUM
   COLUMN=BOTH;total_records;%10d;12;%d;Events;RIGHT;SUM
#
# ZIP file summary
#
TABLE=rel_manager.zip_summary
   COLUMN=BOTH;processed_str;%-13.13s;15;%f;Day Processed;LEFT;none
   COLUMN=BOTH;zip_status;%6d;8;%d;Status;RIGHT;NONE
   COLUMN=BOTH;zip_state;%-18.18s;20;%s;State;LEFT;NONE
   COLUMN=BOTH;rel_state;%-18.18s;20;%s;Load State;LEFT;NONE
   COLUMN=BOTH;row_count;%10d;12;%d;Files;RIGHT;SUM
   COLUMN=BOTH;total_records;%10d;12;%d;Events;RIGHT;SUM
   COLUMN=BOTH;total_file_size_mb;%10.3f;12;%f;Size(Mb);RIGHT;SUM
#
# ZIP File detail ...
#
TABLE=rel_manager.batch_zip_list
   #COLUMN=BOTH;poid_db;0.0.0.%-2.2s;10;%s;Dbno;LEFT;none
   COLUMN=BOTH;poid_id0;%12d;14;%d;Poid;RIGHT;none
   COLUMN=BOTH;mod_time;%-19.19s;21;%s;Mod Time;LEFT;none
   COLUMN=BOTH;input_file_name;%-60.60s;62;%s;Input Filename;LEFT;none
   COLUMN=BOTH;status;%6d;8;%d;Status;RIGHT;none
   COLUMN=BOTH;state;%-18.18s;20;%s;State;LEFT;none
   COLUMN=BOTH;num_total_records;%8d;10;%d;Records;RIGHT;SUM
   COLUMN=BOTH;zip_status;%10d;12;%d;ZIP Status;RIGHT;none
   COLUMN=BOTH;zip_state;%-18.18s;20;%s;ZIP State;LEFT;none
   COLUMN=BOTH;zip_size_mb;%12.3f;14;%f;ZIP Size(Mb);RIGHT;SUM
   COLUMN=BOTH;is_extracted;%-10.10s;12;%s;Extracted?;LEFT;none

#
# REL Monitor performance summary report ...
#
TABLE=rel_manager.perf_summary
   COLUMN=BOTH;start_time;%-19.19s;21;%s;Start Time;LEFT;none
   COLUMN=BOTH;end_time;%-19.19s;21;%s;End Time;LEFT;none
   COLUMN=BOTH;num_files;%10.0f;12;%.0f;#Files;RIGHT;none
   COLUMN=BOTH;num_cdrs;%10.0f;12;%.0f;#CDRs;RIGHT;none
   COLUMN=BOTH;cdrs_per_file;%10.0f;12;%.0f;CDRs/File;RIGHT;none
   #COLUMN=BOTH;preproc_t;%10.3f;12;%.3f;Preproc.Time;RIGHT;none
   #COLUMN=BOTH;preproc_rate;%10.1f;12;%.1f;Preproc.Rate;RIGHT;none
   COLUMN=BOTH;load_t;%10.3f;12;%.3f;Load Time;RIGHT;none
   COLUMN=BOTH;load_rate;%10.1f;12;%.1f;Load Rate;RIGHT;none
   COLUMN=BOTH;preupdate_t;%10.3f;12;%.3f;PreUpd.Time;RIGHT;none
   COLUMN=BOTH;preupdate_rate;%10.1f;12;%.1f;PreUpd.Rate;RIGHT;none
   COLUMN=BOTH;update_t;%10.3f;12;%.3f;Update Time;RIGHT;none
   COLUMN=BOTH;update_rate;%10.1f;12;%.1f;Update Rate;RIGHT;none
   COLUMN=BOTH;total_t;%10.3f;12;%.3f;Total Time;RIGHT;none
   COLUMN=BOTH;total_rate;%10.1f;12;%.1f;Total Rate;RIGHT;none
   COLUMN=BOTH;real_rate;%10.1f;12;%.1f;Real Rate;RIGHT;none

#
# REL Monitor performance detail report ...
#
TABLE=rel_manager.perf_detail
   COLUMN=BOTH;filename;%-52.52s;54;%s;Filename;LEFT;none
   COLUMN=BOTH;stage;%-12.12s;14;%s;Stage;LEFT;none
   COLUMN=BOTH;time_str;%-19.19s;21;%s;Processed At;LEFT;none
   COLUMN=BOTH;millis;%03.0f;5;%.0f;Ms;RIGHT;none
   COLUMN=BOTH;elapsed;%10.3f;12;%.0f;Elapsed;RIGHT;none
   COLUMN=BOTH;num_cdrs;%10.0f;12;%.0f;#CDRs;RIGHT;none
   COLUMN=BOTH;rate;%10.1f;12;%.0f;Rate;RIGHT;none
   COLUMN=BOTH;start_poid_id0;%20s;22;%s;Start POID;RIGHT;none
   COLUMN=BOTH;end_poid_id0;%20s;22;%s;End POID;RIGHT;none
   COLUMN=BOTH;partition_number;%6.0f;8;%.0f;P.Set;RIGHT;none
